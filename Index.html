<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sedoanalgesia en Urgencias · Casos de apertura</title>
<style>
:root{
  --bg:#0B1014;
  --panel:#131C22;
  --panel-2:#182329;
  --line:#26343C;
  --line-soft:#1E2B32;
  --ink:#E4ECEF;
  --ink-dim:#8FA3AC;
  --ink-faint:#63767F;
  --trace:#4FD6B0;
  --alarm:#FF5A6E;
  --warn:#F0A93B;
  --pulse:#5FA8FF;
  --radius:14px;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  line-height:1.5;
  font-size:16px;
  padding:0 0 env(safe-area-inset-bottom);
  min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto;padding:18px 16px 56px}

/* ---------- Cabecera ---------- */
header.top{
  border-bottom:1px solid var(--line);
  padding-bottom:14px;
  margin-bottom:22px;
}
.brandline{
  display:flex;align-items:center;gap:10px;
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--ink-faint);
}
.brandline .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--trace);
  box-shadow:0 0 0 0 rgba(79,214,176,.7);
  animation:beat 1.6s infinite;
}
@keyframes beat{
  0%{box-shadow:0 0 0 0 rgba(79,214,176,.55)}
  70%{box-shadow:0 0 0 9px rgba(79,214,176,0)}
  100%{box-shadow:0 0 0 0 rgba(79,214,176,0)}
}
h1{
  font-size:26px;
  line-height:1.15;
  margin:12px 0 6px;
  font-weight:700;
  letter-spacing:-.02em;
}
.sub{color:var(--ink-dim);font-size:14px;margin:0;max-width:52ch}

/* ---------- Menú ---------- */
.case-card{
  display:block;width:100%;text-align:left;
  background:var(--panel);
  border:1px solid var(--line);
  border-left:3px solid var(--line);
  border-radius:var(--radius);
  padding:16px 16px 15px;
  margin-bottom:12px;
  color:inherit;font:inherit;
  cursor:pointer;
  transition:border-color .18s,transform .12s,background .18s;
}
.case-card:hover,.case-card:focus-visible{background:var(--panel-2);border-left-color:var(--trace)}
.case-card:active{transform:scale(.99)}
.case-idx{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;
  color:var(--ink-faint);text-transform:uppercase;
}
.case-name{font-size:18px;font-weight:650;margin:5px 0 4px;letter-spacing:-.01em}
.case-hint{font-size:13.5px;color:var(--ink-dim);margin:0}
.case-card.done .case-idx{color:var(--trace)}

/* ---------- Escena ---------- */
.scene{animation:rise .28s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;
}
h2{font-size:21px;margin:0 0 12px;font-weight:680;letter-spacing:-.015em;line-height:1.25}
.vignette{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
}
.vignette p{margin:0 0 10px;font-size:15px}
.vignette p:last-child{margin-bottom:0}
.goal{
  border-top:1px dashed var(--line);
  margin-top:12px;padding-top:11px;
  font-size:14px;color:var(--ink-dim);
}
.goal b{color:var(--ink);font-weight:620}

/* ---------- Monitor ---------- */
.monitor{
  background:#080D10;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:12px 12px 10px;
  margin-bottom:16px;
}
.monitor-head{
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;
  color:var(--ink-faint);text-transform:uppercase;margin-bottom:10px;
}
.vitals{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-soft)}
.vital{background:#080D10;padding:9px 8px}
.vital .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--ink-faint)}
.vital .val{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1.15;margin-top:2px}
.vital .unit{font-size:10.5px;color:var(--ink-faint);margin-left:2px;letter-spacing:0}
.v-ok{color:var(--trace)}
.v-warn{color:var(--warn)}
.v-bad{color:var(--alarm)}
.v-neu{color:var(--pulse)}
@media(max-width:400px){.vitals{grid-template-columns:repeat(2,1fr)}}

/* ---------- Decisión ---------- */
.q{
  font-size:16.5px;font-weight:620;margin:0 0 13px;
  padding-left:11px;border-left:3px solid var(--pulse);line-height:1.35;
}
.opt{
  display:block;width:100%;text-align:left;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 14px 13px;
  margin-bottom:10px;
  color:inherit;font:inherit;cursor:pointer;
  transition:border-color .16s,background .16s,transform .1s;
}
.opt:hover,.opt:focus-visible{border-color:var(--pulse);background:var(--panel-2)}
.opt:active{transform:scale(.99)}
.opt .key{
  font-family:var(--mono);font-size:11px;color:var(--ink-faint);
  letter-spacing:.16em;margin-right:9px;
}
.opt .txt{font-size:15px;line-height:1.4}

/* ---------- Desenlace ---------- */
.outcome{border-radius:var(--radius);padding:15px 15px 14px;margin-bottom:14px;border:1px solid}
.outcome.good{background:rgba(79,214,176,.07);border-color:rgba(79,214,176,.38)}
.outcome.bad{background:rgba(255,90,110,.07);border-color:rgba(255,90,110,.4)}
.outcome.mid{background:rgba(240,169,59,.07);border-color:rgba(240,169,59,.4)}
.o-tag{
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;margin-bottom:9px;
}
.outcome.good .o-tag{color:var(--trace)}
.outcome.bad .o-tag{color:var(--alarm)}
.outcome.mid .o-tag{color:var(--warn)}
.o-time{
  font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);
  letter-spacing:.05em;margin-bottom:8px;
}
.outcome p{margin:0 0 10px;font-size:15px}
.outcome p:last-child{margin-bottom:0}
.o-note{
  border-top:1px solid rgba(255,255,255,.09);
  margin-top:12px;padding-top:11px;
  font-size:14px;color:var(--ink-dim);
}
.o-note b{color:var(--ink);font-weight:620}
.chosen{
  font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);
  margin-bottom:12px;letter-spacing:.03em;
}

/* ---------- Navegación ---------- */
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{
  flex:1 1 auto;min-width:132px;
  background:transparent;border:1px solid var(--line);
  color:var(--ink);border-radius:11px;
  padding:12px 15px;font:inherit;font-size:14.5px;font-weight:560;
  cursor:pointer;transition:border-color .16s,background .16s;
}
.btn:hover,.btn:focus-visible{border-color:var(--ink-dim);background:var(--panel)}
.btn.primary{background:var(--trace);border-color:var(--trace);color:#04120D;font-weight:640}
.btn.primary:hover,.btn.primary:focus-visible{background:#63E3C0;border-color:#63E3C0}
:focus-visible{outline:2px solid var(--pulse);outline-offset:2px}

.progress{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
  color:var(--ink-faint);text-transform:uppercase;
  margin-bottom:16px;display:flex;gap:6px;align-items:center;
}
.pip{width:22px;height:2px;background:var(--line);display:inline-block}
.pip.on{background:var(--trace)}

.closing{
  background:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:18px;margin-bottom:14px;
}
.closing h3{margin:0 0 10px;font-size:18px;font-weight:660;letter-spacing:-.01em}
.closing ul{margin:0;padding-left:19px}
.closing li{font-size:15px;margin-bottom:9px}
.closing li:last-child{margin-bottom:0}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brandline"><span class="dot"></span><span>Sala de reanimación · voto en vivo</span></div>
    <h1>Tres pacientes, tres decisiones</h1>
    <p class="sub">Elige la conducta que tomarías con el paciente delante. El monitor responde a los 3–5 minutos, como en la práctica.</p>
  </header>
  <main id="app"></main>
</div>

<script>
const CASES = [
  {
    id:"ped",
    tag:"Caso 01 · Pediátrico",
    name:"Niño de 5 años, fractura desplazada",
    hint:"Reducción cerrada de antebrazo. Sin acceso venoso.",
    title:"Reducción de fractura en preescolar",
    story:[
      "Niño de 5 años, 18 kg, caída de altura hace 40 minutos. Fractura de radio distal desplazada, sin compromiso neurovascular. Llora, retira el brazo ante cualquier acercamiento.",
      "Sin vía venosa. Dos intentos fallidos de canulación previos en el box. Ayuno de 3 horas. Sin comorbilidad, sin infección respiratoria activa."
    ],
    goal:"Reducción cerrada bajo control fluoroscópico e inmovilización.",
    vitals:[
      {l:"FC",v:"138",u:"lpm",c:"v-warn"},
      {l:"PA",v:"104/62",u:"",c:"v-ok"},
      {l:"FR",v:"28",u:"rpm",c:"v-ok"},
      {l:"SatO₂",v:"99",u:"%",c:"v-ok"},
      {l:"Glasgow",v:"15",u:"",c:"v-ok"},
      {l:"Peso",v:"18",u:"kg",c:"v-neu"}
    ],
    question:"¿Con qué partes, sin vía venosa y con un niño que no deja acercarse?",
    options:[
      {
        key:"A",
        text:"Fentanilo intranasal 1,5 mcg/kg con atomizador (27 mcg, repartido en ambas narinas). Esperar 10 minutos y canular al niño ya confortable.",
        verdict:"good",
        tag:"Procedimiento completado",
        time:"T + 10 min",
        body:[
          "A los 5 minutos el llanto cede y tolera el examen del antebrazo. A los 10 minutos se canula sin resistencia con anestésico tópico previo. FC 112, SatO₂ 99% con capnografía en 34 mmHg.",
          "Con vía en marcha se administra ketamina 1 mg/kg IV en 60 segundos. Reducción exitosa con nistagmo y ventilación espontánea conservada. Despierta a los 15 minutos sin agitación."
        ],
        note:"La vía intranasal resolvió el nudo del caso: analgesia antes del acceso, no después. Fentanilo tiene la mejor biodisponibilidad mucosa del grupo y el volumen se respetó."
      },
      {
        key:"B",
        text:"Midazolam intranasal 0,3 mg/kg (5,4 mg) para calmarlo y proceder de inmediato con la reducción.",
        verdict:"bad",
        tag:"Procedimiento suspendido",
        time:"T + 6 min",
        body:[
          "Ardor nasal intenso al administrar. El niño grita, se agita más que antes y escupe parte de la dosis.",
          "A los 6 minutos está somnoliento pero se despierta gritando con la primera tracción. Retira el brazo, la reducción falla y hay que reprogramar el intento."
        ],
        note:"La sedación no bloquea nocicepción. Un niño sedado sin analgesia queda inmovilizado, no analgesiado, y el procedimiento se pierde igual."
      },
      {
        key:"C",
        text:"Ketamina IM 4 mg/kg (72 mg) en deltoides, que es lo más rápido sin vía.",
        verdict:"mid",
        tag:"Objetivo logrado, costo alto",
        time:"T + 30 min",
        body:[
          "Disociación a los 4 minutos. La reducción se completa sin problema.",
          "A los 30 minutos sigue disociado, con sialorrea abundante y sin posibilidad de titular. Ocupa box de observación durante una hora más y despierta con agitación que requiere midazolam de rescate."
        ],
        note:"Funciona, pero se paga con duración impredecible y cero titulación. La IM queda para la agitación extrema sin ninguna otra vía posible."
      },
      {
        key:"D",
        text:"Insistir en la canulación venosa inmovilizando al niño entre dos personas, y sedar recién con la vía puesta.",
        verdict:"bad",
        tag:"Escalada evitable",
        time:"T + 12 min",
        body:[
          "Tres intentos más con el niño sujeto y gritando. Se logra una vía frágil en dorso de mano al cuarto intento.",
          "El niño llega al procedimiento hiperalerta y con el dolor sin tratar. Requiere ketamina en dosis mayor a la prevista y presenta agitación al despertar."
        ],
        note:"Sujetar para puncionar en un niño con dolor no tratado empeora todo lo que viene después. La ruta que parece más rápida termina siendo la más larga."
      }
    ]
  },
  {
    id:"geri",
    tag:"Caso 02 · Adulto mayor frágil",
    name:"Mujer de 87 años, fractura de cadera",
    hint:"Dolor severo y agitación en la espera de pabellón.",
    title:"Fractura de cadera con agitación en la espera",
    story:[
      "Mujer de 87 años, 52 kg, sarcopenia marcada. Caída desde su altura. Fractura pertrocantérea. Lleva 6 horas en el servicio esperando pabellón, con dolor severo al mínimo movimiento.",
      "Creatinina 0,9 mg/dL con clearance estimado real cercano a 35 mL/min. En la última hora está inquieta, intenta levantarse de la camilla y no reconoce a su hija. Sin lentes ni audífonos desde el ingreso."
    ],
    goal:"Controlar el dolor y la agitación mientras espera resolución quirúrgica.",
    vitals:[
      {l:"FC",v:"96",u:"lpm",c:"v-ok"},
      {l:"PA",v:"128/70",u:"",c:"v-ok"},
      {l:"FR",v:"22",u:"rpm",c:"v-ok"},
      {l:"SatO₂",v:"93",u:"%",c:"v-warn"},
      {l:"RASS",v:"+2",u:"",c:"v-warn"},
      {l:"Peso",v:"52",u:"kg",c:"v-neu"}
    ],
    question:"Está agitada y con dolor. ¿Cuál es tu primer movimiento?",
    options:[
      {
        key:"A",
        text:"Bloqueo de fascia ilíaca con bupivacaína 0,25% 25 mL, oxígeno suplementario, devolver lentes y audífonos, y descartar globo vesical.",
        verdict:"good",
        tag:"Estable y orientada",
        time:"T + 20 min",
        body:[
          "El globo vesical resulta positivo: 700 mL al sondear. Con oxígeno la saturación sube a 97%.",
          "A los 20 minutos del bloqueo tolera la movilización sin quejarse. RASS 0, reconoce a su hija, PA 124/68. No requirió opioide sistémico ni sedante."
        ],
        note:"La agitación era dolor no tratado, hipoxia y retención urinaria. El bloqueo regional es la intervención de mayor rendimiento en este caso y la menos usada."
      },
      {
        key:"B",
        text:"Midazolam 2 mg IV para controlar la agitación y poder movilizarla.",
        verdict:"bad",
        tag:"Delirium hiperactivo",
        time:"T + 25 min",
        body:[
          "A los 5 minutos aún está agitada, se administra un segundo bolo de 2 mg. A los 12 minutos se suma el efecto de ambos: somnolencia profunda, FR 9, SatO₂ 88%, retención de CO₂ en capnografía.",
          "Al revertir la depresión ventilatoria con estímulo y oxígeno, evoluciona con delirium hiperactivo fluctuante que persiste 48 horas."
        ],
        note:"El midazolam es predictor independiente de delirium en este grupo, con efecto dosis-dependiente. El rescate antes de los 5 minutos fue el que produjo la apnea."
      },
      {
        key:"C",
        text:"Morfina 6 mg IV en bolo y repetir a los 10 minutos si persiste el dolor.",
        verdict:"bad",
        tag:"Sedación tardía",
        time:"T + 45 min",
        body:[
          "Dolor controlado a los 20 minutos, pero la paciente queda somnolienta y con FR 10.",
          "A los 45 minutos, con la acumulación de morfina-6-glucurónido en una función renal peor que la que sugiere la creatinina, presenta resedación tardía que obliga a vigilancia continua y retrasa el traslado."
        ],
        note:"La creatinina normal por sarcopenia esconde el clearance real. La dosis correcta en el papel resultó desproporcionada en la práctica."
      },
      {
        key:"D",
        text:"Haloperidol 2,5 mg IV para la agitación y analgesia después, cuando esté tranquila.",
        verdict:"mid",
        tag:"Causa no corregida",
        time:"T + 30 min",
        body:[
          "La agitación motora disminuye a los 25 minutos. La paciente deja de intentar levantarse, pero sigue con muecas de dolor a cada movilización.",
          "El QT se prolonga a 490 ms en el control y el dolor sigue sin tratarse. Persiste la hipoxia por hipoventilación antiálgica."
        ],
        note:"Sedar la manifestación sin corregir la causa. Si se necesita fármaco, haloperidol es mejor opción que benzodiacepina, pero la dosis es 0,25–0,5 mg y no reemplaza la analgesia."
      }
    ]
  },
  {
    id:"shock",
    tag:"Caso 03 · Inestabilidad hemodinámica",
    name:"Hombre de 54 años, shock séptico",
    hint:"Intubación en paciente con presión sostenida por vasoconstricción.",
    title:"Intubación en shock séptico establecido",
    story:[
      "Hombre de 54 años, 80 kg. Neumonía de tres días de evolución, ingresa con compromiso de conciencia y trabajo respiratorio progresivo. Piel moteada, llene capilar 5 segundos, extremidades frías.",
      "Lactato 5,8 mmol/L. Ha recibido 2.000 mL de cristaloides sin cambio en la perfusión. Noradrenalina cargada, aún no conectada. Se decide intubación."
    ],
    goal:"Intubación orotraqueal con secuencia rápida.",
    vitals:[
      {l:"FC",v:"126",u:"lpm",c:"v-bad"},
      {l:"PA",v:"98/72",u:"",c:"v-warn"},
      {l:"FR",v:"34",u:"rpm",c:"v-bad"},
      {l:"SatO₂",v:"89",u:"%",c:"v-bad"},
      {l:"Shock index",v:"1,3",u:"",c:"v-bad"},
      {l:"Lactato",v:"5,8",u:"mmol/L",c:"v-bad"}
    ],
    question:"La presión sistólica es 98. ¿Con qué induces?",
    options:[
      {
        key:"A",
        text:"Noradrenalina en infusión periférica corriendo, ketamina 0,5 mg/kg (40 mg) IV y rocuronio 1,2 mg/kg (96 mg). Sedación de mantención lista antes de laringoscopiar.",
        verdict:"good",
        tag:"Intubación sin colapso",
        time:"T + 5 min",
        body:[
          "Parálisis completa a los 55 segundos. Intubación al primer intento con oxigenación apneica en curso, saturación mínima 91%.",
          "PA posintubación 96/58 con noradrenalina a 0,08 mcg/kg/min. Volumen corriente 7 mL/kg de peso predicho, sin auto-PEEP. Infusión de fentanilo y ketamina en marcha antes de que se disipe el inductor."
        ],
        note:"Inductor a la mitad, paralizante completo o mayor. El vasopresor estaba corriendo antes del bolo, no después de la hipotensión."
      },
      {
        key:"B",
        text:"Propofol 1,5 mg/kg (120 mg) y rocuronio 0,6 mg/kg, que da mejores condiciones de laringoscopía.",
        verdict:"bad",
        tag:"Paro periintubación",
        time:"T + 4 min",
        body:[
          "A los 60 segundos la presión cae a 54/30. Con la ventilación a presión positiva el retorno venoso se desploma y aparece disociación electromecánica.",
          "Se inicia compresiones y noradrenalina en bolo. Retorno de circulación espontánea a los 4 minutos, con lactato en ascenso."
        ],
        note:"Propofol suma vasodilatación arterial y venosa a depresión miocárdica directa en un paciente que se sostenía solo por tono simpático. Está contraindicado como inductor aquí."
      },
      {
        key:"C",
        text:"Ketamina 2 mg/kg (160 mg) IV, que es hemodinámicamente segura, con rocuronio 1,2 mg/kg.",
        verdict:"bad",
        tag:"Hipotensión profunda",
        time:"T + 3 min",
        body:[
          "La presión cae a 62/38 en los primeros dos minutos, sin la respuesta simpaticomimética esperada.",
          "Requiere bolos repetidos de noradrenalina y escalada rápida de la infusión. Intubación completada, con 15 minutos de hipoperfusión que no debieron ocurrir."
        ],
        note:"En shock prolongado la reserva catecolaminérgica está agotada y queda expuesto el inotropismo negativo directo de la ketamina. No es un fármaco inocuo: depende de las reservas del paciente."
      },
      {
        key:"D",
        text:"Midazolam 0,1 mg/kg más fentanilo 2 mcg/kg, que es la combinación más suave para su hemodinamia.",
        verdict:"bad",
        tag:"Rescate prematuro",
        time:"T + 6 min",
        body:[
          "A los 3 minutos el paciente sigue reactivo. Se administra un segundo bolo de midazolam. Las dos dosis alcanzan el pico juntas: PA 58/32 y rigidez torácica por el bolo rápido de fentanilo.",
          "La ventilación con bolsa es difícil, la intubación se hace en condiciones subóptimas y requiere dos intentos."
        ],
        note:"Con gasto cardíaco bajo el tiempo brazo-cerebro se alarga y la latencia larga invita al rescate prematuro. La dosis que parecía no llegar, llegó toda junta."
      }
    ]
  }
];

const app = document.getElementById("app");
const done = new Set();
let cur = null;

function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function pips(active){
  return CASES.map((c,i)=>`<span class="pip${done.has(c.id)||i===active?"on":""}"></span>`).join("");
}

function renderMenu(){
  cur=null;
  app.innerHTML = `
  <div class="scene">
    <div class="progress">${pips(-1)}<span style="margin-left:6px">${done.size} de 3 resueltos</span></div>
    ${CASES.map((c,i)=>`
      <button class="case-card${done.has(c.id)?" done":""}" data-go="${c.id}">
        <div class="case-idx">${esc(c.tag)}${done.has(c.id)?" · resuelto":""}</div>
        <div class="case-name">${esc(c.name)}</div>
        <p class="case-hint">${esc(c.hint)}</p>
      </button>`).join("")}
    ${done.size===3?`<div class="nav"><button class="btn primary" data-close="1">Ver el cierre</button></div>`:""}
  </div>`;
  window.scrollTo({top:0,behavior:"instant"});
}

function renderCase(id){
  const c = CASES.find(x=>x.id===id);
  cur = c;
  const idx = CASES.indexOf(c);
  app.innerHTML = `
  <div class="scene">
    <div class="progress">${pips(idx)}</div>
    <div class="eyebrow">${esc(c.tag)}</div>
    <h2>${esc(c.title)}</h2>
    <div class="monitor">
      <div class="monitor-head"><span>Monitor · ingreso</span><span>tiempo 0</span></div>
      <div class="vitals">
        ${c.vitals.map(v=>`<div class="vital"><div class="lbl">${esc(v.l)}</div><div class="val ${v.c}">${esc(v.v)}<span class="unit">${esc(v.u)}</span></div></div>`).join("")}
      </div>
    </div>
    <div class="vignette">
      ${c.story.map(p=>`<p>${esc(p)}</p>`).join("")}
      <div class="goal"><b>Procedimiento:</b> ${esc(c.goal)}</div>
    </div>
    <p class="q">${esc(c.question)}</p>
    ${c.options.map((o,i)=>`
      <button class="opt" data-pick="${i}">
        <span class="key">${esc(o.key)}</span><span class="txt">${esc(o.text)}</span>
      </button>`).join("")}
    <div class="nav"><button class="btn" data-menu="1">Volver al menú</button></div>
  </div>`;
  window.scrollTo({top:0,behavior:"instant"});
}

function renderOutcome(i){
  const c = cur, o = c.options[i];
  done.add(c.id);
  const nextCase = CASES.find(x=>!done.has(x.id));
  app.innerHTML = `
  <div class="scene">
    <div class="progress">${pips(CASES.indexOf(c))}</div>
    <div class="eyebrow">${esc(c.tag)} · evolución</div>
    <p class="chosen">Elegiste ${esc(o.key)} — ${esc(o.text)}</p>
    <div class="outcome ${o.verdict}">
      <div class="o-tag"><span>${esc(o.tag)}</span></div>
      <div class="o-time">${esc(o.time)}</div>
      ${o.body.map(p=>`<p>${esc(p)}</p>`).join("")}
      <div class="o-note">${esc(o.note)}</div>
    </div>
    <div class="nav">
      <button class="btn" data-retry="${c.id}">Probar otra opción</button>
      ${nextCase
        ? `<button class="btn primary" data-go="${nextCase.id}">Siguiente caso</button>`
        : `<button class="btn primary" data-close="1">Ver el cierre</button>`}
      <button class="btn" data-menu="1">Menú</button>
    </div>
  </div>`;
  window.scrollTo({top:0,behavior:"instant"});
}

function renderClosing(){
  app.innerHTML = `
  <div class="scene">
    <div class="eyebrow">Los tres casos, un mismo hilo</div>
    <h2>Lo que decidió el desenlace no fue el fármaco</h2>
    <div class="closing">
      <ul>
        <li>En el niño, la vía elegida. Analgesia antes del acceso venoso, no después de sujetarlo.</li>
        <li>En la adulta mayor, la causa de la agitación. Dolor, hipoxia y globo vesical antes que cualquier sedante.</li>
        <li>En el shock, la secuencia. Vasopresor corriendo, inductor a la mitad y paralizante completo.</li>
      </ul>
    </div>
    <div class="closing">
      <h3>La pregunta que sigue</h3>
      <p style="margin:0;font-size:15px;color:var(--ink-dim)">¿Cuánto reducir, cuánto esperar y con qué fármaco en cada población? Eso viene ahora.</p>
    </div>
    <div class="nav"><button class="btn" data-menu="1">Volver al menú</button></div>
  </div>`;
  window.scrollTo({top:0,behavior:"instant"});
}

app.addEventListener("click", e=>{
  const t = e.target.closest("button");
  if(!t) return;
  if(t.dataset.go) return renderCase(t.dataset.go);
  if(t.dataset.pick!==undefined) return renderOutcome(+t.dataset.pick);
  if(t.dataset.retry) return renderCase(t.dataset.retry);
  if(t.dataset.menu) return renderMenu();
  if(t.dataset.close) return renderClosing();
});

renderMenu();
</script>
</body>
</html>
